<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <title>Prijava</title>
    <link rel="stylesheet" href="loginStyle.css">
</head>
<body>
    <div class="container">
        <h2>Prijava</h2>
        <form id="loginForm">
            <label>
                Korisničko ime:
                <input type="text" id="username" required>
            </label>
            <label>
                Lozinka:
                <input type="password" id="password" required>
            </label>
            <button type="submit">Prijavi se</button>
        </form>
        <div id="error"></div>
    </div>
    <script src="login.js"></script>
</body>
</html>
